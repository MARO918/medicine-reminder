<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おくすりチェック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky: #eaf7fc;
    --sky-mid: #cdeefb;
    --sky-deep: #7fd1ee;
    --accent: #4fb6e0;
    --white: #ffffff;
    --cross-red: #ff6b6b;
    --cross-red-deep: #e8555f;
    --text-navy: #33546a;
    --text-soft: #6d8ba0;
    --shadow: 0 12px 30px rgba(79, 182, 224, 0.18);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: "M PLUS Rounded 1c", sans-serif;
  }

  body{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.6) 0, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(255,255,255,0.5) 0, transparent 45%),
      linear-gradient(160deg, var(--sky) 0%, var(--sky-mid) 55%, var(--sky-deep) 130%);
    overflow: hidden;
    position: relative;
  }

  /* 病院っぽい十字の壁紙パターン（さりげなく） */
  .cross-pattern{
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.35;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 78px, rgba(255,255,255,0.5) 78px, rgba(255,255,255,0.5) 80px
    );
    z-index: 0;
  }
  .floating-cross{
    position: fixed;
    color: rgba(255,255,255,0.55);
    font-weight: 800;
    z-index: 0;
    animation: drift 12s ease-in-out infinite;
    user-select: none;
  }
  .floating-cross.c1{ top: 8%; left: 8%; font-size: 34px; animation-delay: 0s; }
  .floating-cross.c2{ top: 70%; left: 12%; font-size: 22px; animation-delay: 2s; }
  .floating-cross.c3{ top: 15%; right: 10%; font-size: 26px; animation-delay: 1s; }
  .floating-cross.c4{ bottom: 10%; right: 8%; font-size: 40px; animation-delay: 3s; }

  @keyframes drift{
    0%, 100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-14px) rotate(6deg); }
  }

  /* ===== アプリカード ===== */
  .app{
    position: relative;
    z-index: 1;
    width: 380px;
    max-width: 92vw;
    height: 640px;
    max-height: 90vh;
    background: var(--white);
    border-radius: 32px;
    box-shadow: var(--shadow), 0 0 0 8px rgba(255,255,255,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ヘッダー */
  .header{
    background: linear-gradient(135deg, var(--accent), #6cc7ec);
    padding: 22px 20px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    flex-shrink: 0;
  }
  .cross-badge{
    width: 44px;
    height: 44px;
    background: var(--white);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    flex-shrink: 0;
    animation: pulse 2.4s ease-in-out infinite;
  }
  .cross-badge::before{
    content: "";
    width: 22px;
    height: 22px;
    background:
      linear-gradient(var(--cross-red), var(--cross-red)) center / 100% 34%  no-repeat,
      linear-gradient(var(--cross-red), var(--cross-red)) center / 34% 100% no-repeat;
    border-radius: 3px;
  }
  @keyframes pulse{
    0%, 100%{ transform: scale(1); }
    50%{ transform: scale(1.08); }
  }
  .header-text h1{
    margin: 0;
    color: var(--white);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  .header-text p{
    margin: 2px 0 0;
    color: rgba(255,255,255,0.9);
    font-size: 11px;
  }

  /* キャラクター表示エリア（背景として） */
  .character-stage{
    position: relative;
    flex: 1;
    background: linear-gradient(180deg, #f3fbfe 0%, #e4f6fc 100%);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ▼▼▼ キャラクター画像プレースホルダー ▼▼▼
     ここに提供いただいたキャラクター画像を差し込みます。
     差し替え方法：下の <div class="character-placeholder"> を
     <img class="character-image" src="ここに画像ファイル名.png" alt="おくすりキャラクター">
     に置き換えてください。
  */
  .character-placeholder{
    position: absolute;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    width: 130px;
    height: 130px;
    opacity: 0.9;
    animation: float 3.6s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
  }
  @keyframes float{
    0%, 100%{ transform: translateX(-50%) translateY(0); }
    50%{ transform: translateX(-50%) translateY(-10px); }
  }
  .character-placeholder svg{ width: 100%; height: 100%; }
  /* ▲▲▲ キャラクター画像プレースホルダー ここまで ▲▲▲ */

  /* チャット欄 */
  .chat-scroll{
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-scroll::-webkit-scrollbar{ width: 5px; }
  .chat-scroll::-webkit-scrollbar-thumb{ background: var(--sky-mid); border-radius: 10px; }

  .bubble-row{
    display: flex;
    opacity: 0;
    animation: pop-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .bubble-row.bot{ justify-content: flex-start; }
  .bubble-row.user{ justify-content: flex-end; }

  @keyframes pop-in{
    0%{ opacity: 0; transform: translateY(14px) scale(0.9); }
    100%{ opacity: 1; transform: translateY(0) scale(1); }
  }

  .bubble{
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 14.5px;
    line-height: 1.5;
    box-shadow: 0 4px 10px rgba(79,182,224,0.12);
  }
  .bubble.bot{
    background: var(--white);
    color: var(--text-navy);
    border-bottom-left-radius: 6px;
    border: 1px solid #eaf6fb;
  }
  .bubble.bot.praise{
    background: linear-gradient(135deg, #fff0f0, #ffe6e8);
    border: 1px solid #ffd6d9;
    font-weight: 700;
    color: var(--cross-red-deep);
  }
  .bubble.user{
    background: linear-gradient(135deg, var(--accent), #6cc7ec);
    color: var(--white);
    border-bottom-right-radius: 6px;
    font-weight: 600;
  }

  /* 選択肢ボタン */
  .choices-row{
    display: flex;
    gap: 10px;
    justify-content: flex-start;
    padding-left: 4px;
    opacity: 0;
    animation: pop-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: 0.15s;
  }
  .choice-btn{
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 11px 22px;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    box-shadow: 0 5px 14px rgba(0,0,0,0.08);
  }
  .choice-btn:active{ transform: scale(0.94); }
  .choice-btn:hover{ transform: translateY(-2px); filter: brightness(1.03); }

  .choice-btn.yes{
    background: linear-gradient(135deg, #7fe0c4, #4fcf9f);
    color: #fff;
  }
  .choice-btn.no{
    background: linear-gradient(135deg, #ffb2b8, var(--cross-red));
    color: #fff;
  }

  /* スタート／リセット エリア */
  .action-area{
    padding: 16px;
    display: flex;
    justify-content: center;
    flex-shrink: 0;
  }
  .action-area.hidden{ display: none; }

  .main-btn{
    font-family: inherit;
    font-size: 16px;
    font-weight: 800;
    color: var(--white);
    padding: 14px 42px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #6cc7ec);
    box-shadow: 0 8px 20px rgba(79,182,224,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .main-btn:active{ transform: scale(0.95); }
  .main-btn.reset{
    background: linear-gradient(135deg, #ffb2b8, var(--cross-red));
    box-shadow: 0 8px 20px rgba(232,85,95,0.35);
  }
  .main-btn .mini-cross{
    width: 14px; height: 14px;
    background:
      linear-gradient(#fff,#fff) center / 100% 34% no-repeat,
      linear-gradient(#fff,#fff) center / 34% 100% no-repeat;
  }

  @media (max-width: 420px){
    .app{ height: 92vh; border-radius: 24px; }
  }
</style>
</head>
<body>

  <div class="cross-pattern"></div>
  <div class="floating-cross c1">+</div>
  <div class="floating-cross c2">+</div>
  <div class="floating-cross c3">+</div>
  <div class="floating-cross c4">+</div>

  <div class="app">
    <div class="header">
      <div class="cross-badge"></div>
      <div class="header-text">
        <h1>おくすりチェック</h1>
        <p>今日もお疲れさまです</p>
      </div>
    </div>

    <div class="character-stage">
      <!-- キャラクター画像プレースホルダー（後で画像に差し替え） -->
      <div class="character-placeholder">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="100" cy="185" rx="55" ry="8" fill="#bfe6f5" opacity="0.5"/>
          <g>
            <rect x="55" y="55" width="90" height="100" rx="45" fill="#ffffff" stroke="#cdeefb" stroke-width="3"/>
            <rect x="55" y="55" width="90" height="50" rx="45" fill="#7fd1ee"/>
            <rect x="55" y="80" width="90" height="12" fill="#7fd1ee"/>
            <circle cx="80" cy="120" r="6" fill="#33546a"/>
            <circle cx="120" cy="120" r="6" fill="#33546a"/>
            <path d="M82 138 Q100 150 118 138" stroke="#33546a" stroke-width="4" fill="none" stroke-linecap="round"/>
            <circle cx="70" cy="128" r="7" fill="#ffb2b8" opacity="0.7"/>
            <circle cx="130" cy="128" r="7" fill="#ffb2b8" opacity="0.7"/>
            <rect x="88" y="20" width="10" height="24" rx="4" fill="#ff6b6b"/>
            <rect x="79" y="29" width="28" height="10" rx="4" fill="#ff6b6b"/>
          </g>
        </svg>
      </div>

      <div class="chat-scroll" id="chatScroll"></div>
    </div>

    <div class="action-area" id="actionArea">
      <button class="main-btn" id="startBtn" onclick="startChat()">
        <span class="mini-cross"></span> スタート
      </button>
    </div>
  </div>

<script>
  const chatScroll = document.getElementById('chatScroll');
  const actionArea = document.getElementById('actionArea');

  function scrollToBottom(){
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function addBubble(text, sender, extraClass = ''){
    const row = document.createElement('div');
    row.className = `bubble-row ${sender}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender} ${extraClass}`;
    bubble.textContent = text;
    row.appendChild(bubble);
    chatScroll.appendChild(row);
    scrollToBottom();
  }

  function addChoices(){
    const row = document.createElement('div');
    row.className = 'choices-row';
    row.id = 'currentChoices';

    const yesBtn = document.createElement('button');
    yesBtn.className = 'choice-btn yes';
    yesBtn.textContent = 'はい';
    yesBtn.onclick = () => handleAnswer(true);

    const noBtn = document.createElement('button');
    noBtn.className = 'choice-btn no';
    noBtn.textContent = 'いいえ';
    noBtn.onclick = () => handleAnswer(false);

    row.appendChild(yesBtn);
    row.appendChild(noBtn);
    chatScroll.appendChild(row);
    scrollToBottom();
  }

  function removeCurrentChoices(){
    const current = document.getElementById('currentChoices');
    if(current) current.remove();
  }

  function askQuestion(){
    setTimeout(() => {
      addBubble('お薬飲んだ？', 'bot');
      addChoices();
    }, 350);
  }

  function startChat(){
    chatScroll.innerHTML = '';
    actionArea.classList.add('hidden');
    askQuestion();
  }

  function handleAnswer(isYes){
    removeCurrentChoices();
    addBubble(isYes ? 'はい' : 'いいえ', 'user');

    if(isYes){
      setTimeout(() => {
        addBubble('えらい！ ✨', 'bot', 'praise');
        showResetButton();
      }, 400);
    } else {
      askQuestion();
    }
  }

  function showResetButton(){
    setTimeout(() => {
      actionArea.innerHTML = `
        <button class="main-btn reset" onclick="resetChat()">
          <span class="mini-cross"></span> リセット
        </button>
      `;
      actionArea.classList.remove('hidden');
    }, 500);
  }

  function resetChat(){
    chatScroll.innerHTML = '';
    actionArea.innerHTML = `
      <button class="main-btn" id="startBtn" onclick="startChat()">
        <span class="mini-cross"></span> スタート
      </button>
    `;
  }
</script>
</body>
</html>
